  </defs>
  <rect width="100" height="100" rx="22" fill="url(#ig)"/>
  <!-- Growth chart bars -->
  <rect x="15" y="72" width="14" height="10" rx="2" fill="white" opacity="0.4"/>
  <rect x="33" y="60" width="14" height="22" rx="2" fill="white" opacity="0.55"/>
  <rect x="51" y="46" width="14" height="36" rx="2" fill="white" opacity="0.7"/>
