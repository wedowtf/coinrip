<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#rc)"/>
  <!-- Reddit-style circle with crypto twist -->
  <circle cx="50" cy="48" r="28" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  <circle cx="50" cy="48" r="18" fill="white" opacity="0.15"/>
  <!-- Reddit alien simplified eyes and smile -->
  <circle cx="42" cy="44" r="4" fill="white" opacity="0.9"/>
  <circle cx="58" cy="44" r="4" fill="white" opacity="0.9"/>
  <circle cx="42" cy="44" r="2" fill="#DC2626"/>
  <circle cx="58" cy="44" r="2" fill="#DC2626"/>
  <!-- smile -->
  <path d="M 40 54 Q 50 62 60 54" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Antenna -->
  <line x1="50" y1="20" x2="50" y2="30" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <circle cx="50" cy="18" r="4" fill="white" opacity="0.8"/>
  <!-- Coin symbol bottom -->
  <text x="50" y="88" font-family="Arial Black,sans-serif" font-size="11" font-weight="900" fill="white" text-anchor="middle" opacity="0.8">₿ REDDIT</text>
</svg>