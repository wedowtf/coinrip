<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="an" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#an)"/>
  <!-- 3D wireframe cube -->
  <!-- Front face -->
  <rect x="28" y="40" width="32" height="32" rx="2" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
  <!-- Top face -->
  <polygon points="28,40 44,28 76,28 60,40" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <!-- Right face -->
  <polygon points="60,40 76,28 76,60 60,72" fill="none" stroke="white" stroke-width="2.5" opacity="0.6"/>
  <!-- Inner lines for depth -->
  <line x1="44" y1="28" x2="44" y2="40" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="40" x2="60" y2="72" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="40" x2="76" y2="28" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- AI sparkles -->
  <circle cx="25" cy="25" r="2.5" fill="#E879F9" opacity="0.8"/>
  <circle cx="78" cy="72" r="2" fill="#38BDF8" opacity="0.8"/>
  <circle cx="20" cy="70" r="1.5" fill="#E879F9" opacity="0.6"/>
</svg>