<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="dt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#dt)"/>
  <!-- Terminal header -->
  <rect x="14" y="18" width="72" height="8" rx="3" fill="#10B981" opacity="0.4"/>
  <circle cx="22" cy="22" r="3" fill="#EF4444" opacity="0.8"/>
  <circle cx="32" cy="22" r="3" fill="#FBBF24" opacity="0.8"/>
  <circle cx="42" cy="22" r="3" fill="#10B981" opacity="0.8"/>
  <!-- Candlestick chart -->
  <!-- Bar 1 - bear (red) -->
  <line x1="26" y1="38" x2="26" y2="74" stroke="#EF4444" stroke-width="1.5" opacity="0.7"/>
  <rect x="22" y="44" width="8" height="14" rx="1" fill="#EF4444"/>
  <!-- Bar 2 - bull (green) -->
  <line x1="40" y1="34" x2="40" y2="72" stroke="#10B981" stroke-width="1.5" opacity="0.7"/>
  <rect x="36" y="40" width="8" height="18" rx="1" fill="#10B981"/>
  <!-- Bar 3 - bull big -->
  <line x1="54" y1="30" x2="54" y2="76" stroke="#10B981" stroke-width="1.5" opacity="0.7"/>
  <rect x="50" y="36" width="8" height="24" rx="1" fill="#10B981"/>
  <!-- Bar 4 - bear -->
  <line x1="68" y1="38" x2="68" y2="78" stroke="#EF4444" stroke-width="1.5" opacity="0.7"/>
  <rect x="64" y="48" width="8" height="16" rx="1" fill="#EF4444"/>
  <!-- Trend line -->
  <polyline points="26,56 40,52 54,45 68,42" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
</svg>