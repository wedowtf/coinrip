<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="la" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#la)"/>
  <!-- Robot/agent face -->
  <!-- Head -->
  <rect x="26" y="28" width="48" height="44" rx="10" fill="white" opacity="0.95"/>
  <!-- Antenna -->
  <line x1="50" y1="14" x2="50" y2="28" stroke="white" stroke-width="3" opacity="0.8"/>
  <circle cx="50" cy="12" r="5" fill="#A78BFA" opacity="0.9"/>
  <!-- Eyes -->
  <rect x="33" y="38" width="12" height="10" rx="3" fill="#7C3AED"/>
  <rect x="55" y="38" width="12" height="10" rx="3" fill="#7C3AED"/>
  <!-- Eye glow -->
  <rect x="35" y="40" width="5" height="4" rx="1.5" fill="#E879F9" opacity="0.8"/>
  <rect x="57" y="40" width="5" height="4" rx="1.5" fill="#E879F9" opacity="0.8"/>
  <!-- Mouth panel -->
  <rect x="33" y="55" width="34" height="9" rx="3" fill="#E0E7FF" opacity="0.4"/>
  <rect x="35" y="57" width="6" height="5" rx="1.5" fill="#7C3AED" opacity="0.7"/>
  <rect x="44" y="57" width="6" height="5" rx="1.5" fill="#7C3AED" opacity="0.7"/>
  <rect x="53" y="57" width="6" height="5" rx="1.5" fill="#7C3AED" opacity="0.7"/>
  <!-- Body connectors -->
  <rect x="33" y="72" width="12" height="8" rx="4" fill="white" opacity="0.5"/>
  <rect x="55" y="72" width="12" height="8" rx="4" fill="white" opacity="0.5"/>
</svg>