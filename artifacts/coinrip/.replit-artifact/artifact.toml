kind = "web"
previewPath = "/"
title = "CoinRip"
version = "1.0.0"
id = "artifacts/coinrip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23942

[services.development]
run = "pnpm --filter @workspace/coinrip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coinrip", "run", "build" ]
publicDir = "artifacts/coinrip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23942"
BASE_PATH = "/"
