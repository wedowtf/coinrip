name: Deploy CoinRip to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build CoinRip
        working-directory: artifacts/coinrip
        env:
          PORT: "3000"
          BASE_PATH: /
          NODE_ENV: production
          VITE_FIREBASE_API_KEY: "AIzaSyBWWxphPouvBF5BHcugNjX7Flj4_XG5zuE"
          VITE_FIREBASE_AUTH_DOMAIN: "coinflip-23314.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "coinflip-23314"
          VITE_FIREBASE_STORAGE_BUCKET: "coinflip-23314.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "551996530497"
          VITE_FIREBASE_APP_ID: "1:551996530497:web:a74826eae27de3d76d8bc0"
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/coinrip/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

